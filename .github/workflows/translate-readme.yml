name: Translate README

on:
  push:
    branches:
      - main
    paths:
      - README.md
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install deepl
        run: pip install deepl

      - name: Translate README.md → README.en.md
        run: python3 .github/scripts/translate_readme.py
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}

      - name: Commit and push README.en.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.en.md
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "docs: update README.en.md (auto-translated)" && git push
